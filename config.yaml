entry: researcher

agents:
  researcher:
    model: gemma3:4b
    top_k: 4
  writer:
    model: gemma3:27b
  reviewer:
    model: gemma3:4b

edges:
  - [researcher, writer]
  - [writer, reviewer]

conditional_edges:
  - source: reviewer
    router: review_router
    paths:
      revise: writer
      pass: END

settings:
  max_revisions: 2